<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML5 Video Lifecycle Test</title>

<style>
  video {
    width: 480px;
    display: block;
    margin: 10px;
    background: black;
  }
</style>
</head>

<body bgColor="white">

<h2>Automatic video lifecycle test</h2>

<div id="container"></div>

<script>
const videoUrl = "https://www.w3schools.com/html/mov_bbb.mp4";
const container = document.getElementById("container");

let video1 = null;
let video2 = null;


// Create first video
function createVideo1() {
    video1 = document.createElement("video");

    video1.src = videoUrl;
    video1.controls = true;
    video1.muted = true;
    video1.playsInline = true;

    container.appendChild(video1);

    console.log("Video 1 created");

    video1.play()
        .then(() => {
            console.log("Video 1 playing");

            setTimeout(() => {
                video1.pause();
                console.log("Video 1 paused");
            }, 1000);
        })
        .catch(console.error);
}


// Create second video
function createVideo2() {
    video2 = document.createElement("video");

    video2.src = videoUrl;
    video2.controls = true;
    video2.muted = true;
    video2.playsInline = true;

    container.appendChild(video2);

    video2.load();

    video2.addEventListener("loadedmetadata", () => {
        video2.pause();
        console.log("Video 2 initialized and paused");
    }, { once: true });
}


// Destroy first video and play second
function destroyVideo1PlayVideo2() {
    if (video1) {
        video1.pause();

        video1.removeAttribute("src");
        video1.load();

        video1.remove();
        video1 = null;

        console.log("Video 1 destroyed");
    }
}

function playVideo2() {
    if (video2) {
        video2.play()
            .then(() => {
                console.log("Video 2 playing");
            })
            .catch(console.error);
    }
}

createVideo1();

setTimeout(() => {
    createVideo2();
}, 5000);

setTimeout(() => {
    destroyVideo1PlayVideo2();
}, 10000);

setTimeout(() => {
    playVideo2();
}, 13000);

</script>

</body>
</html>
